<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpMePass </title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="container">
        <header>
            <h1>HelpMePass </h1>
            <p class="subtitle">Upload your Question Papers. Let the panic begin.</p>
        </header>

        <div class="controls">
            <!-- File Upload Area -->
            <div class="file-upload-wrapper" onclick="document.getElementById('files').click()">
                <input type="file" id="files" multiple accept=".pdf" />
                <div class="upload-text">
                    > INITIATE UPLOAD SEQUENCE (CLICK OR DRAG)
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="button-group">
                <button type="button" onclick="uploadFiles()">
                    EXECUTE
                </button>
                <button type="button" class="secondary" onclick="downloadText()">
                    EXPORT_LOGS
                </button>
            </div>

            <!-- Search -->
            <div class="search-container">
                <input type="text" id="searchBox" placeholder="Search for keywords (e.g., 'define', 'explain')..."
                    onkeyup="filterResults()">
            </div>
        </div>

        <p id="matchCount"></p>
        <div id="results"></div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <script src="/static/script.js"></script>

</body>

</html>
